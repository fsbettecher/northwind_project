version: 2

models:
  - name: fct_orders
    description: >
      Tabela principal com uma linha por item de pedido. Principal tabela do dashboard
    columns:
      - name: order_id
        tests: [not_null]
      - name: product_id
        tests: [not_null]
      - name: net_revenue
        tests: [not_null]

  - name: customers_rfm
    description: >
      Tabela modelada por cliente. Criada separadamente, pois exige agregação
      por cliente e quebraria a lógica da fct_orders.
    columns:
      - name: customer_id
        tests: [unique, not_null]